name: Update flake inputs

on:
  schedule:
    - cron: "0 0 * * 0" # weekly, Sunday midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake inputs
        run: nix flake update

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "flake: update inputs"
          title: "flake: update inputs"
          body: |
            Automated flake input update.

            Run `nix flake lock --update-input <input>` to update individual inputs.
          branch: automation/update-flake-inputs
          delete-branch: true
